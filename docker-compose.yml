name: wallet-map

services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-map-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallet_map
      POSTGRES_USER: wallet_map
      POSTGRES_PASSWORD: wallet_map
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_map -d wallet_map"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wallet-map-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
